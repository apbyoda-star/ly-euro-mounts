<html lang="en">
<head>

  <meta property="og:site_name" content="LY Euro Mounts">
  <meta property="og:title" content="Gallery | LY Euro Mounts — European Skull Mounts">
  <meta property="og:description" content="Photos of European skull mounts by LY Euro Mounts — whitetail deer, mule deer, and hog. Upstate SC and Upper & Central Georgia.">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Gallery | LY Euro Mounts">
  <meta name="twitter:description" content="Photos of European skull mounts — whitetail, mule deer, and hog. Serving Upstate SC and Georgia.">

  <link rel="icon" href="favicon.ico" sizes="32x32">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Lato:wght@300;400;700&display=swap">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Lato:wght@300;400;700&display=swap" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Lato:wght@300;400;700&display=swap"></noscript>

  <style>
    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    img { display: block; max-width: 100%; height: auto; }
    a { color: inherit; text-decoration: none; }
    ul { list-style: none; }
    button { font-family: inherit; cursor: pointer; }

    /* ── Variables ── */
    :root {
      --dark:        #14100A;
      --dark-2:      #1C1610;
      --gold:        #B89050;
      --cream:       #EAE0C8;
      --cream-light: #F4EDDA;
      --text:        #C4BAA0;
      --footer-bg:   #0D0A06;
    }

    /* ── Base ── */
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Lato', sans-serif;
      background: var(--dark);
      color: var(--cream);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── NAV ── */
    nav {
      position: fixed;
      inset: 0 0 auto;
      z-index: 300;
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(20, 16, 10, .97);
      box-shadow: 0 1px 0 rgba(184,144,80,.18);
    }
    .nav-logo img { height: 44px; width: auto; }
    .nav-links {
      display: flex;
      gap: 2.5rem;
    }
    .nav-links a {
      font-size: .67rem;
      font-weight: 700;
      letter-spacing: .2em;
      text-transform: uppercase;
      transition: color .2s;
    }
    .nav-links a:hover { color: var(--gold); }
    .nav-links a.active { color: var(--gold); }

    /* Burger */
    .burger {
      display: none;
      flex-direction: column;
      justify-content: center;
      gap: 5px;
      background: none;
      border: none;
      padding: 6px;
      min-width: 44px;
      min-height: 44px;
    }
    .burger span {
      display: block;
      width: 24px;
      height: 2px;
      background: var(--cream);
      transition: transform .3s, opacity .3s;
    }
    .burger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .burger.open span:nth-child(2) { opacity: 0; }
    .burger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    .mobile-menu {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--dark);
      z-index: 290;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2.5rem;
    }
    .mobile-menu.open { display: flex; }
    .mobile-menu a {
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: .15em;
      text-transform: uppercase;
      padding: .4rem 1rem;
      transition: color .2s;
    }
    .mobile-menu a:hover { color: var(--gold); }
    .mobile-menu a.active { color: var(--gold); }

    /* ── PAGE HEADER ── */
    .page-header {
      padding: 7rem 1.5rem 3.5rem;
      text-align: center;
      background: var(--dark-2);
    }
    .page-label {
      display: block;
      font-size: .6rem;
      font-weight: 700;
      letter-spacing: .3em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: .6rem;
    }
    .page-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.5rem, 8vw, 4rem);
      font-weight: 600;
      line-height: 1.08;
      color: var(--cream-light);
      margin-bottom: 1rem;
    }
    .page-hint {
      font-size: .7rem;
      font-weight: 400;
      letter-spacing: .12em;
      color: rgba(184,144,80,.55);
      font-style: italic;
    }

    /* ── GALLERY ── */
    #gallery {
      background: var(--dark-2);
      padding: 0 1.25rem 5rem;
    }
    .gallery {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }
    .gallery-item {
      overflow: hidden;
      position: relative;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      display: block;
      aspect-ratio: 3/4;
    }
    .gallery-item:first-child { aspect-ratio: 4/3; }
    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform .65s ease;
      pointer-events: none;
    }
    .gallery-item::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(20,16,10,0);
      transition: background .3s;
    }
    .gallery-item:hover::after,
    .gallery-item:focus-visible::after { background: rgba(20,16,10,.18); }
    .gallery-item:hover img { transform: scale(1.05); }
    .gallery-item:focus-visible {
      outline: 2px solid var(--gold);
      outline-offset: -2px;
    }

    /* ── LIGHTBOX ── */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(13, 9, 5, .97);
      z-index: 500;
      align-items: center;
      justify-content: center;
    }
    .lightbox.open { display: flex; }
    .lb-img-wrap {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4.5rem 4rem;
    }
    .lb-img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
    }
    .lb-btn {
      position: absolute;
      background: none;
      border: none;
      color: rgba(234,224,200,.7);
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 50px;
      min-height: 50px;
      transition: color .2s;
      padding: .5rem;
    }
    .lb-btn:hover, .lb-btn:focus-visible { color: var(--gold); outline: none; }
    .lb-close { top: 1rem; right: 1rem; }
    .lb-prev { left: .5rem; top: 50%; transform: translateY(-50%); }
    .lb-next { right: .5rem; top: 50%; transform: translateY(-50%); }
    .lb-counter {
      position: absolute;
      bottom: 1.25rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: .62rem;
      letter-spacing: .2em;
      color: rgba(234,224,200,.35);
      pointer-events: none;
    }

    /* ── FOOTER ── */
    footer {
      background: var(--footer-bg);
      border-top: 1px solid rgba(184,144,80,.1);
      padding: 2.5rem 1.5rem;
      text-align: center;
    }
    footer img {
      height: 50px;
      width: auto;
      margin: 0 auto 1rem;
      opacity: .55;
    }
    footer p {
      font-size: .6rem;
      font-weight: 300;
      letter-spacing: .14em;
      color: rgba(234,224,200,.28);
    }

    /* ── RESPONSIVE: Tablet 600px+ ── */
    @media (min-width: 600px) {
      nav { padding: 1.1rem 2rem; }

      .gallery {
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      .gallery-item { aspect-ratio: 3/4; }
      .gallery-item:first-child {
        grid-column: span 2;
        aspect-ratio: 16/9;
      }

      .lb-prev { left: 1.25rem; }
      .lb-next { right: 1.25rem; }
      .lb-img-wrap { padding: 5rem 7rem; }
      .lb-btn { min-width: 56px; min-height: 56px; }
    }

    /* ── RESPONSIVE: Desktop 900px+ ── */
    @media (min-width: 900px) {
      nav { padding: 1.1rem 2.5rem; }
      .nav-links { display: flex; }
      .burger { display: none; }

      .gallery {
        grid-template-columns: repeat(3, 1fr);
        grid-auto-rows: auto;
        gap: 10px;
      }
      .gallery-item { aspect-ratio: 3/4; }
      .gallery-item:first-child {
        grid-column: span 2;
        aspect-ratio: 16/9;
      }
    }

    @media (max-width: 899px) {
      .nav-links { display: none; }
      .burger { display: flex; }
    }
  </style>
</head>
<body>

  <!-- ── NAV ── -->
  <nav>
    <a href="index.html" class="nav-logo" aria-label="LY Euro Mounts — Home">
      <img src="images/logo-1.webp" alt="LY Euro Mounts">
    </a>
    <ul class="nav-links" role="list">
      <li><a href="gallery.html" class="active">Work</a></li>
      <li><a href="index.html#services">Services</a></li>
      <li><a href="index.html#about">About</a></li>
      <li><a href="index.html#contact">Contact</a></li>
    </ul>
    <button class="burger" id="burger" aria-label="Toggle navigation" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <div class="mobile-menu" id="mobileMenu" role="dialog" aria-label="Navigation menu">
    <a href="gallery.html" class="active" onclick="closeMenu()">Work</a>
    <a href="index.html#services" onclick="closeMenu()">Services</a>
    <a href="index.html#about"    onclick="closeMenu()">About</a>
    <a href="index.html#contact"  onclick="closeMenu()">Contact</a>
  </div>

  <!-- ── PAGE HEADER ── -->
  <header class="page-header">
    <span class="page-label">LY Euro Mounts</span>
    <h1 class="page-title">The Work</h1>
    <p class="page-hint">Tap any photo to view full size</p>
  </header>

  <!-- ── GALLERY ── -->
  <section id="gallery" aria-label="Full gallery">
    <div class="gallery" role="list">
      <figure class="gallery-item" role="listitem" tabindex="0" aria-label="View: Five whitetail euro mounts on wood wall">
        <img src="images/wall-of-5.webp" alt="Five whitetail euro mounts displayed on a dark wood plank wall" loading="lazy">
      </figure>
      <figure class="gallery-item" role="listitem" tabindex="0" aria-label="View: Euro mount on fence post">
        <img src="images/fence-post.webp" alt="Euro mount displayed on a rustic wooden fence post under a dramatic sky" loading="lazy">
      </figure>
      <figure class="gallery-item" role="listitem" tabindex="0" aria-label="View: Euro mount by a tree">
        <img src="images/by-tree.webp" alt="Finished euro mount resting against the base of a tree surrounded by fall leaves" loading="lazy">
      </figure>
      <figure class="gallery-item" role="listitem" tabindex="0" aria-label="View: Mule deer euro mount">
        <img src="images/mule-deer.webp" alt="Mule deer euro mount on a natural wood plaque" loading="lazy">
      </figure>
      <figure class="gallery-item" role="listitem" tabindex="0" aria-label="View: Hunter with whitetail in cornfield">
        <img src="images/customer-cornfield.webp" alt="Hunter posing with a whitetail buck in a cornfield at night" loading="lazy">
      </figure>
      <figure class="gallery-item" role="listitem" tabindex="0" aria-label="View: Before and after — deer to euro mount">
        <img src="images/customer-before-after.webp" alt="Hunter with harvested whitetail deer and inset photo of the finished euro mount" loading="lazy">
      </figure>
      <figure class="gallery-item" role="listitem" tabindex="0" aria-label="View: Hunter with whitetail in the woods">
        <img src="images/customer-woods.webp" alt="Hunter kneeling with a whitetail buck in the woods" loading="lazy">
      </figure>
      <figure class="gallery-item" role="listitem" tabindex="0" aria-label="View: Hunter with whitetail at night">
        <img src="images/customer-lady.webp" alt="Hunter in orange safety vest with a whitetail deer at night" loading="lazy">
      </figure>
    </div>
  </section>

  <!-- ── FOOTER ── -->
  <footer>
    <img src="images/logo-3.webp" alt="LY Euro Mounts">
    <p>&copy; 2025 LY Euro Mounts &nbsp;·&nbsp; Upstate SC &nbsp;·&nbsp; All Rights Reserved</p>
  </footer>

  <!-- ── LIGHTBOX ── -->
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Gallery image viewer">
    <button class="lb-btn lb-close" id="lbClose" aria-label="Close gallery">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
    <button class="lb-btn lb-prev" id="lbPrev" aria-label="Previous image">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>
    <button class="lb-btn lb-next" id="lbNext" aria-label="Next image">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="9 18 15 12 9 6"/>
      </svg>
    </button>
    <div class="lb-img-wrap">
      <img id="lbImg" src="" alt="" class="lb-img">
    </div>
    <p class="lb-counter" id="lbCounter" aria-live="polite" aria-atomic="true"></p>
  </div>

  <script>
    // ── Nav scroll (gallery nav is always solid) ──
    const burger     = document.getElementById('burger');
    const mobileMenu = document.getElementById('mobileMenu');

    function closeMenu() {
      mobileMenu.classList.remove('open');
      burger.classList.remove('open');
      burger.setAttribute('aria-expanded', 'false');
      document.body.style.overflow = '';
    }
    burger.addEventListener('click', () => {
      const open = mobileMenu.classList.toggle('open');
      burger.classList.toggle('open', open);
      burger.setAttribute('aria-expanded', open);
      document.body.style.overflow = open ? 'hidden' : '';
    });
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && mobileMenu.classList.contains('open')) closeMenu();
    });

    // ── Lightbox ──
    const GALLERY = [
      { src: 'images/wall-of-5.webp',            alt: 'Five whitetail euro mounts displayed on a dark wood plank wall' },
      { src: 'images/fence-post.webp',            alt: 'Euro mount displayed on a rustic wooden fence post under a dramatic sky' },
      { src: 'images/by-tree.webp',               alt: 'Finished euro mount resting against a tree surrounded by fall leaves' },
      { src: 'images/mule-deer.webp',             alt: 'Mule deer euro mount on a natural wood plaque' },
      { src: 'images/customer-cornfield.webp',    alt: 'Hunter posing with a whitetail buck in a cornfield at night' },
      { src: 'images/customer-before-after.webp', alt: 'Hunter with harvested deer and inset of the finished euro mount' },
      { src: 'images/customer-woods.webp',        alt: 'Hunter kneeling with a whitetail buck in the woods' },
      { src: 'images/customer-lady.webp',         alt: 'Hunter in orange safety vest with a whitetail deer at night' },
    ];

    let lbIndex = 0;
    let lbOpen  = false;

    const lightbox  = document.getElementById('lightbox');
    const lbImg     = document.getElementById('lbImg');
    const lbCounter = document.getElementById('lbCounter');

    function updateLightbox() {
      const { src, alt } = GALLERY[lbIndex];
      lbImg.src = src;
      lbImg.alt = alt;
      lbCounter.textContent = (lbIndex + 1) + ' / ' + GALLERY.length;
    }

    function openLightbox(i) {
      lbIndex = i;
      lbOpen  = true;
      updateLightbox();
      lightbox.classList.add('open');
      document.body.style.overflow = 'hidden';
      document.getElementById('lbClose').focus();
    }

    function closeLightbox() {
      lbOpen = false;
      lightbox.classList.remove('open');
      document.body.style.overflow = '';
    }

    function lbPrev() {
      lbIndex = (lbIndex - 1 + GALLERY.length) % GALLERY.length;
      updateLightbox();
    }

    function lbNext() {
      lbIndex = (lbIndex + 1) % GALLERY.length;
      updateLightbox();
    }

    document.querySelectorAll('.gallery-item').forEach((item, i) => {
      item.addEventListener('click', () => openLightbox(i));
      item.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openLightbox(i); }
      });
    });

    document.getElementById('lbClose').addEventListener('click', closeLightbox);
    document.getElementById('lbPrev').addEventListener('click', e => { e.stopPropagation(); lbPrev(); });
    document.getElementById('lbNext').addEventListener('click', e => { e.stopPropagation(); lbNext(); });

    lightbox.addEventListener('click', e => {
      if (e.target === lightbox || e.target === lbImg.parentElement) closeLightbox();
    });

    document.addEventListener('keydown', e => {
      if (!lbOpen) return;
      if (e.key === 'Escape')     closeLightbox();
      if (e.key === 'ArrowLeft')  lbPrev();
      if (e.key === 'ArrowRight') lbNext();
    });

    let touchStartX = 0;
    lightbox.addEventListener('touchstart', e => {
      touchStartX = e.touches[0].clientX;
    }, { passive: true });
    lightbox.addEventListener('touchend', e => {
      const diff = touchStartX - e.changedTouches[0].clientX;
      if (Math.abs(diff) > 50) diff > 0 ? lbNext() : lbPrev();
    }, { passive: true });
  </script>
</body>
</html>
